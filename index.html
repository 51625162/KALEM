<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALEM V2</title>

<link rel="stylesheet" href="assets/css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-feather"></i>
<h2>KALEM</h2>
</div>

<ul>

<li class="active">
<i class="fa-solid fa-house"></i>
<span>Dashboard</span>
</li>

<li>
<i class="fa-solid fa-folder"></i>
<span>Evraklar</span>
</li>

<li>
<i class="fa-solid fa-users"></i>
<span>Kullanıcılar</span>
</li>

<li>
<i class="fa-solid fa-chart-line"></i>
<span>Raporlar</span>
</li>

<li>
<i class="fa-solid fa-calendar"></i>
<span>Takvim</span>
</li>

<li>
<i class="fa-solid fa-bell"></i>
<span>Bildirimler</span>
</li>

<li>
<i class="fa-solid fa-gear"></i>
<span>Ayarlar</span>
</li>

</ul>

</div>

<div class="main">

<header>

<div class="search">

<input
type="text"
placeholder="Ara...">

</div>

<div class="profile">

<i class="fa-solid fa-bell"></i>

<img
src="https://i.pravatar.cc/100"
alt="">

</div>

</header>

<section class="cards">

<div class="card">

<h3>Toplam Evrak</h3>

<h1 id="evrak">0</h1>

</div>

<div class="card">

<h3>Kullanıcı</h3>

<h1 id="users">0</h1>

</div>

<div class="card">

<h3>Bugünkü İşlem</h3>

<h1 id="today">0</h1>

</div>

<div class="card">

<h3>Bekleyen</h3>

<h1 id="waiting">0</h1>

</div>

</section>

<section class="table">

<h2>Son İşlemler</h2>

<table>

<thead>

<tr>

<th>Tarih</th>

<th>İşlem</th>

<th>Durum</th>

</tr>

</thead>

<tbody id="tableData">

</tbody>

</table>

</section>

</div>

<script src="assets/js/app.js"></script>

</body>

</html>
