<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KALEM V2</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="sidebar">

<h2>📋 KALEM</h2>

<ul>

<li class="active">🏠 Dashboard</li>

<li>📁 Belgeler</li>

<li>➕ Yeni Belge</li>

<li>⚙️ Ayarlar</li>

</ul>

</div>

<div class="main">

<header>

<h1>Dashboard</h1>

<p>Belge yönetim paneli</p>

</header>

<section class="cards">

<div class="card">

<h3>Toplam Belge</h3>

<p id="toplamBelge">0</p>

</div>

<div class="card">

<h3>Tamamlanan</h3>

<p id="tamamlananBelge">0</p>

</div>

<div class="card">

<h3>Bekleyen</h3>

<p id="bekleyenBelge">0</p>

</div>

</section>

<section class="ekle">

<h2>Yeni Belge</h2>

<input
type="text"
id="belgeAdi"
placeholder="Belge adı">

<select id="kategori">

<option>Kimlik</option>

<option>Eğitim</option>

<option>Sağlık</option>

<option>Resmi Evrak</option>

<option>Diğer</option>

</select>

<select id="durum">

<option>Bekliyor</option>

<option>Tamamlandı</option>

</select>

<button onclick="belgeEkle()">

Belgeyi Kaydet

</button>

</section>

<section class="arama">

<input

type="text"

id="arama"

placeholder="Belge Ara..."

onkeyup="aramaYap()">

</section>

<section>

<h2>Kayıtlı Belgeler</h2>

<div id="belgeListesi">

</div>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
